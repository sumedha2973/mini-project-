<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Package Details | Travel Explorer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(to right, #1e3c72, #2a5298); color: white; min-height: 100vh; }
        .navbar { background: #0f172a !important; padding: 15px 0; }
        .details-card { background: white; color: #333; border-radius: 20px; overflow: hidden; border: none; }
        .details-img { height: 400px; object-fit: cover; width: 100%; }
        .price-text { color: #ff9800; font-size: 2rem; font-weight: bold; }
        .btn-book { background: linear-gradient(45deg, #ff416c, #ff4b2b); color: white; border: none; font-size: 1.2rem; border-radius: 25px; }
        .btn-book:hover { opacity: 0.9; color: white; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-5">
    <div class="container">
        <a class="navbar-brand fw-bold text-info" href="package.html">← Back to Packages</a>
    </div>
</nav>

<div class="container pb-5">
    <div class="card details-card shadow-lg">
        <img id="packageImg" src="" class="details-img" alt="Package Image">
        <div class="card-body p-4 p-md-5">
            <div class="d-flex justify-content-between align-items-center flex-wrap mb-3">
                <h1 id="packageName" class="fw-bold mb-0"></h1>
                <div id="packagePrice" class="price-text"></div>
            </div>
            <h4 id="packageDesc" class="text-muted mb-4"></h4>
            <hr>
            <h5 class="fw-bold mt-4">What's Included:</h5>
            <ul class="text-muted lh-lg">
                <li>Premium Handpicked Accommodation & Stays</li>
                <li>Guided Local Sightseeing & Entry Tickets Included</li>
                <li>Daily Fresh Breakfast & Authentic Dinner Spreads</li>
                <li>24/7 On-Ground Emergency Travel Support Assistance</li>
            </ul>
            <div class="text-center mt-5">
                <button id="bookBtn" class="btn btn-book px-5 py-3 shadow">Book This Package Now</button>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name') || 'Premium Package';
        const price = urlParams.get('price') || 'Contact Us';
        const desc = urlParams.get('desc') || 'Curated itinerary experience';
        const img = urlParams.get('img') || 'img/paris tour.jpg';

        document.getElementById('packageName').textContent = name;
        document.getElementById('packagePrice').textContent = price;
        document.getElementById('packageDesc').textContent = desc;
        document.getElementById('packageImg').src = img;

        // Automatically pass values directly down to your final book.html page if they hit buy!
        document.getElementById('bookBtn').addEventListener('click', function() {
            window.location.href = `book.html?trip=${encodeURIComponent(name)}&price=${encodeURIComponent(price)}`;
        });
    });
</script>
</body>
</html>
