  <!-- Text -->
  <text x="70" y="35" font-size="22" font-family="Arial" fill="white" font-weight="bold">
    Trip Nova
  </text>

  <!-- Gradient -->
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="purple"></stop>
      <stop offset="100%" stop-color="pink"></stop>
    </linearGradient>
  </defs>

</svg>