<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  
  <!-- Circle Background -->
  <circle cx="30" cy="30" r="25" fill="url(#grad)"></circle>

  <!-- Airplane Icon -->
