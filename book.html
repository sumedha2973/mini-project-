<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Trip | Travel Explorer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: #0f172a !important; padding: 15px 0; }
        .booking-card { border-radius: 15px; border: none; }
        .btn-custom { background: linear-gradient(45deg, #ff416c, #ff4b2b); color: white; border: none; }
        .btn-custom:hover { opacity: 0.9; color: white; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-5">
    <div class="container">
        <a class="navbar-brand fw-bold text-info" href="Trips.html">← Back to Trips</a>
    </div>
</nav>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card booking-card shadow p-4 p-md-5">
                <h2 class="fw-bold mb-4 text-center">Complete Your Booking</h2>
                
                <form id="bookingForm">
                    <!-- Row 1: Automatically Filled Trip Details -->
                    <div class="row g-3 mb-4 p-3 bg-light rounded">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-secondary">Selected Destination</label>
                            <input type="text" class="form-control bg-white border-0 fw-bold fs-5" id="selectedTrip" readonly style="color: #6a11cb;">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-secondary">Package Price</label>
                            <input type="text" class="form-control bg-white border-0 fw-bold fs-5 text-success" id="selectedPrice" readonly>
                        </div>
                    </div>

                    <!-- Row 2: Customer Identity -->
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label for="customerName" class="form-label fw-semibold">Your Name</label>
                            <input type="text" class="form-control" id="customerName" placeholder="John Doe" required>
                        </div>
                        <div class="col-md-6">
                            <label for="customerEmail" class="form-label fw-semibold">Email Address</label>
                            <input type="email" class="form-control" id="customerEmail" placeholder="name@example.com" required>
                        </div>
                    </div>

                    <!-- Row 3: Contact & Dates -->
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label for="customerPhone" class="form-label fw-semibold">Phone Number</label>
                            <input type="tel" class="form-control" id="customerPhone" placeholder="+91 XXXXX XXXXX" required>
                        </div>
                        <div class="col-md-6">
                            <label for="travelDate" class="form-label fw-semibold">Travel Date</label>
                            <input type="date" class="form-control" id="travelDate" required>
                        </div>
                    </div>

                    <!-- Row 4: Guests & Notes -->
                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <label for="guestCount" class="form-label fw-semibold">Number of Guests</label>
                            <input type="number" class="form-control" id="guestCount" min="1" value="1">
                        </div>
                        <div class="col-md-8">
                            <label for="additionalNotes" class="form-label fw-semibold">Special Requests</label>
                            <textarea class="form-control" id="additionalNotes" rows="1" placeholder="Dietary rules, extra beds, etc."></textarea>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-custom w-100 py-2 fs-5 fw-bold rounded-3 shadow-sm">Confirm Booking Request</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        // Automatically grab values out of the browser address bar URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const trip = urlParams.get('trip') || 'Our Featured Trip';
        const price = urlParams.get('price') || 'Contact Us';

        // Set them right into the inputs
        document.getElementById('selectedTrip').value = trip;
        document.getElementById('selectedPrice').value = price;

        // Handle Form Submission
        document.getElementById('bookingForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const name = document.getElementById('customerName').value;
            alert('Thank you, ' + name + '! Your booking request for ' + trip + ' has been received.');
            window.location.href = 'Trips.html'; // Send them back to looking at trips
        });
    });
</script>

</body>
</html>
